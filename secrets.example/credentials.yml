---
# =============================================================================
# CDX-E Secrets Template
# =============================================================================
# Copy this file to secrets/credentials.yml and fill in real values:
#   cp secrets.example/credentials.yml secrets/credentials.yml
#
# Then encrypt with ansible-vault:
#   ansible-vault encrypt secrets/credentials.yml
#
# The secrets/ directory is gitignored and will never be committed.
# =============================================================================

# ---------------------------------------------------------------------------
# Proxmox API credentials
# Used by Ansible (proxmoxer) and Terraform (TF_VAR_proxmox_api_token_*)
# ---------------------------------------------------------------------------
proxmox:
  api_host: "cdx-pve-01"             # Proxmox node hostname or IP
  api_user: "ansible@pam"            # Proxmox API user (realm@auth)
  api_token_id: "ansible"            # API token name (without user prefix)
  api_token_secret: "REPLACE_WITH_ACTUAL_TOKEN"

# ---------------------------------------------------------------------------
# Cloud-init / VM initial credentials
# Injected into cloned VMs by Terraform cloud-init at deploy time.
# ---------------------------------------------------------------------------
cloud_init:
  password: "REPLACE_WITH_CLOUD_INIT_PASSWORD"

# ---------------------------------------------------------------------------
# Top-level vault_* variables — referenced directly in scenario.yml and vms.yaml
# ---------------------------------------------------------------------------

# Used in vms.yaml: cloud_init.password: "{{ vault_cloud_init_password }}"
# Used in windows_hosts.yml: ansible_password: "{{ vault_cloud_init_password }}"
vault_cloud_init_password: "REPLACE_WITH_CLOUD_INIT_PASSWORD"

# Used in scenario.yml: domain.admin_password: "{{ vault_domain_admin_password }}"
# This becomes the DSRM password and initial domain admin password during forest creation.
vault_domain_admin_password: "REPLACE_WITH_DOMAIN_ADMIN_PASSWORD"

# Used in vms.yaml: ssh_public_key: "{{ vault_ssh_public_key }}"
# Paste the contents of your controller's ~/.ssh/id_rsa.pub (or equivalent).
vault_ssh_public_key: "ssh-rsa AAAAB3... user@host"

# SQL Server SA account password — required by deploy_sql_server when sql_auth_mode: Mixed
# Mixed mode is required for Exchange Server (Exchange uses SQL auth internally)
vault_sql_sa_password: "REPLACE_WITH_SQL_SA_PASSWORD"

# ---------------------------------------------------------------------------
# Terraform API credentials
# Passed as TF_VAR_ environment variables by Ansible during terraform apply.
# Must use the full token ID format: user@realm!token_name
# ---------------------------------------------------------------------------
terraform:
  proxmox_api_token_id: "ansible@pam!ansible"
  proxmox_api_token_secret: "REPLACE_WITH_ACTUAL_TOKEN"
