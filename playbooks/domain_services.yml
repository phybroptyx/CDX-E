  roles:
    - install_windowsfeature   # IIS feature only — configure_vm runs in Phase 5

# ----------------------------------------------------------------------------
# Post-play: record phase6 completion in pipeline checkpoint
# ----------------------------------------------------------------------------
# Only writes a checkpoint record when domain_services_checkpoint_phase is set
# (i.e., this is the full Phase 6 run from site.yml, not the Phase 4.7 DHCP
# pre-boot call). The record is skipped if the phase was already complete.
- name: Record Phase 6 Checkpoint
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Record domain services phase as complete
      ansible.builtin.include_role:
        name: pipeline_checkpoint
      vars:
        pipeline_checkpoint_action: record_complete
        pipeline_checkpoint_phase: "{{ domain_services_checkpoint_phase }}"
      when:
        - domain_services_checkpoint_phase | default('') | length > 0
        - not (_phase_skip | default(false) | bool)
