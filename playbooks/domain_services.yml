---
# =============================================================================
# CDX-E Playbook: Domain Services Deployment
# =============================================================================
# Purpose: Conditional orchestrator for all domain-integrated services.
#          Reads scenario.phases.services.* flags to determine which services
#          to deploy. Each service is a separate play with its own host group
#          and self-gates via meta: end_play if not required by the scenario.
#
# Entry point for full pipeline runs. Individual service playbooks
# (dhcp_management.yml, sql_management.yml, etc.) remain available for
# targeted standalone operations by White Cell.
#
# Usage:
#   ansible-playbook playbooks/domain_services.yml \
#     -e "exercise=OBSIDIAN_DAGGER" \
#     -e "@../secrets/credentials.yml" --ask-vault-pass
# =============================================================================

# ----------------------------------------------------------------------------
# Pre-play: load exercise configuration
# ----------------------------------------------------------------------------
- name: Load Exercise Configuration
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Load exercise configuration
      ansible.builtin.import_role:
        name: read_exercise_config

# ----------------------------------------------------------------------------
# Pre-play: ensure SOCKS5 relay tunnel is open before WinRM connections
# ----------------------------------------------------------------------------
- name: Ensure Relay SOCKS5 Tunnel
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Ensure SOCKS5 relay tunnel is open
      ansible.builtin.include_role:
        name: relay_tunnel
      vars:
        relay_tunnel_action: open

# ----------------------------------------------------------------------------
# Pre-play: check pipeline checkpoint — skip if phase6 already completed
# ----------------------------------------------------------------------------
# Only active when domain_services_checkpoint_phase is set by the caller.
# Phase 4.7 (DHCP pre-boot) leaves this unset so the checkpoint is not
# evaluated for the early DHCP run. Phase 6 (site.yml) passes
# domain_services_checkpoint_phase: phase6 to enable resume logic.
- name: Check Phase 6 Checkpoint
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Check pipeline checkpoint for domain services phase
      ansible.builtin.include_role:
        name: pipeline_checkpoint
      vars:
        pipeline_checkpoint_action: check
        pipeline_checkpoint_phase: "{{ domain_services_checkpoint_phase }}"
      when: domain_services_checkpoint_phase | default('') | length > 0

    - name: Set _phase_skip to false when checkpoint is not configured
      ansible.builtin.set_fact:
        _phase_skip: false
      when: domain_services_checkpoint_phase | default('') | length == 0

# --- DHCP ------------------------------------------------------------------ #
- name: "Domain Services: DHCP"
  hosts: dhcp_servers
  gather_facts: false
  tags: [services, dhcp]

  vars_files:
    - "../secrets/credentials.yml"

  pre_tasks:
    - name: Import exercise facts from pre-play
      ansible.builtin.set_fact:
        scenario:         "{{ hostvars['localhost'].scenario }}"
        exercise_dir:     "{{ hostvars['localhost'].exercise_dir }}"
        virtual_machines: "{{ hostvars['localhost'].virtual_machines }}"

    - name: "[preflight] Skip — phase6 already completed (checkpoint)"
      ansible.builtin.meta: end_play
      when: hostvars['localhost']._phase_skip | default(false) | bool

    - name: "[preflight] Skip — destroy workflow, no configuration to run"
      ansible.builtin.meta: end_play
      when: (action | default('deploy')) == 'destroy'

    - name: "[preflight] Skip DHCP - not required by scenario"
      ansible.builtin.meta: end_play
      when: not (scenario.phases.services.dhcp | default(false) | bool)

    - name: "[preflight] Assert DHCP hosts are reachable"
      ansible.builtin.assert:
        that: groups['dhcp_servers'] | default([]) | length > 0
        fail_msg: "dhcp_servers group is empty but DHCP phase is enabled."

  roles:
    - deploy_dhcp

# --- SQL Server ------------------------------------------------------------ #
- name: "Domain Services: SQL Server"
  hosts: sql_servers
  gather_facts: false
  tags: [services, sql]

  vars_files:
    - "../secrets/credentials.yml"

  pre_tasks:
    - name: Import exercise facts from pre-play
      ansible.builtin.set_fact:
        scenario:         "{{ hostvars['localhost'].scenario }}"
        exercise_dir:     "{{ hostvars['localhost'].exercise_dir }}"
        virtual_machines: "{{ hostvars['localhost'].virtual_machines }}"

    - name: "[preflight] Skip — destroy workflow, no configuration to run"
      ansible.builtin.meta: end_play
      when: (action | default('deploy')) == 'destroy'

    - name: "[preflight] Skip SQL - not required by scenario"
      ansible.builtin.meta: end_play
      when: not (scenario.phases.services.sql | default(false) | bool)

    - name: "[preflight] Assert SQL hosts are reachable"
      ansible.builtin.assert:
        that: groups['sql_servers'] | default([]) | length > 0
        fail_msg: "sql_servers group is empty but SQL phase is enabled."

  roles:
    - deploy_sql_server

# --- Microsoft Exchange ---------------------------------------------------- #
- name: "Domain Services: Microsoft Exchange"
  hosts: exchange_servers
  gather_facts: false
  tags: [services, exchange]

  vars_files:
    - "../secrets/credentials.yml"

  pre_tasks:
    - name: Import exercise facts from pre-play
      ansible.builtin.set_fact:
        scenario:         "{{ hostvars['localhost'].scenario }}"
        exercise_dir:     "{{ hostvars['localhost'].exercise_dir }}"
        virtual_machines: "{{ hostvars['localhost'].virtual_machines }}"

    - name: "[preflight] Skip — destroy workflow, no configuration to run"
      ansible.builtin.meta: end_play
      when: (action | default('deploy')) == 'destroy'

    - name: "[preflight] Skip Exchange - not required by scenario"
      ansible.builtin.meta: end_play
      when: not (scenario.phases.services.exchange | default(false) | bool)

    - name: "[preflight] Assert SQL is deployed before Exchange"
      ansible.builtin.assert:
        that: scenario.phases.services.sql | default(false) | bool
        fail_msg: "Exchange requires SQL Server. Set scenario.phases.services.sql: true"

    - name: "[preflight] Assert Exchange hosts are reachable"
      ansible.builtin.assert:
        that: groups['exchange_servers'] | default([]) | length > 0
        fail_msg: "exchange_servers group is empty but Exchange phase is enabled."

  roles:
    - deploy_microsoft_exchange

