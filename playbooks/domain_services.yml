      ansible.builtin.assert:
        that: groups['iis_servers'] | default([]) | length > 0
        fail_msg: "iis_servers group is empty but IIS phase is enabled."

  roles:
    - install_windowsfeature   # IIS feature only — configure_vm runs in Phase 5

# ----------------------------------------------------------------------------
# Post-play: record phase completion in pipeline checkpoint
# ----------------------------------------------------------------------------
# Records whatever phase key the caller supplied (phase4a_dhcp or phase6).
# Skipped when domain_services_checkpoint_phase is unset (standalone run) or
# when _phase_skip is true (phase was already complete — nothing new to record).
- name: Record Domain Services Checkpoint
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Record domain services phase as complete
      ansible.builtin.include_role:
        name: pipeline_checkpoint
      vars:
        pipeline_checkpoint_action: record_complete
        pipeline_checkpoint_phase: "{{ domain_services_checkpoint_phase }}"
      when:
        - domain_services_checkpoint_phase | default('') | length > 0
        - not (_phase_skip | default(false) | bool)
        - (action | default('deploy')) != 'destroy'
