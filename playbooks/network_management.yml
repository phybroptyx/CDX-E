---
# =============================================================================
# CDX-E Playbook: Scenario Network Management
# =============================================================================
# Purpose: Deploy or revert scenario-related SDN configuration within the
#          Proxmox environment, then configure VyOS routers.
#
# Roles:
#   - configure_networking  (action=deploy)
#   - revert_networking     (action=destroy)
#
# Both roles run on localhost and delegate Proxmox node operations to
# cluster members in inventory/hosts.yml → proxmox_cluster.
# VyOS config is pushed via SSH delegation to vyos_hosts.
#
# Usage:
#   # Apply network config
#   ansible-playbook playbooks/network_management.yml \
#     -e "exercise=OBSIDIAN_DAGGER action=deploy" \
#     -e "@../secrets/credentials.yml"
#
#   # Revert network config (full teardown)
#   ansible-playbook playbooks/network_management.yml \
#     -e "exercise=OBSIDIAN_DAGGER action=destroy" \
#     -e "@../secrets/credentials.yml"
# =============================================================================

- name: Load exercise configuration
  hosts: localhost
  gather_facts: false

  vars_files:
    - "../secrets/credentials.yml"

  roles:
    - role: read_exercise_config

- name: Scenario Network Management
  hosts: localhost
  gather_facts: false

  vars_files:
    - "../secrets/credentials.yml"

  vars:
    net_action: "{{ action | default('deploy') }}"

  pre_tasks:
    - name: "[preflight] Skip bridge-creation scope during destroy"
      ansible.builtin.meta: end_play
      when: >-
        (action | default('deploy')) == 'destroy' and
        (networking_scope | default('all')) == 'bridges'

    - name: "[preflight] Skip — networking phase disabled in scenario"
      ansible.builtin.meta: end_play
      when: not (scenario.phases.networking | default(true) | bool)

  roles:
    - role: configure_networking
      when: net_action == 'deploy'
    - role: revert_networking
      when: net_action == 'destroy'

# ----------------------------------------------------------------------------
# Play 3 — Relay exercise NIC management
# ----------------------------------------------------------------------------
# On deploy: hot-attach the relay's exercise NIC(s) and assign IPs after
#            SDN bridges are up (Play 2 / configure_networking).
# On destroy: release NICs and flush IPs (safe after bridge removal —
#             all ip/link commands in release_nics.yml use failed_when: false).
# Skips automatically if the exercise has no relay.nic_assignments defined.
- name: Relay exercise NIC management
  hosts: cdx-relay
  become: true
  gather_facts: false

  vars_files:
    - "../secrets/credentials.yml"

  vars:
    relay_nic_assignments: >-
      {{ (hostvars['localhost']['scenario'].relay | default({})).nic_assignments | default([]) }}
    relay_routes: >-
      {{ (hostvars['localhost']['scenario'].relay | default({})).routes | default([]) }}

  pre_tasks:
    - name: "[preflight] Skip — no relay NIC assignments defined for this exercise"
      ansible.builtin.meta: end_play
      when: relay_nic_assignments | length == 0

  roles:
    - role: configure_relay
      vars:
        relay_action: >-
          {{ 'assign_nics' if (action | default('deploy')) == 'deploy' else 'release_nics' }}
