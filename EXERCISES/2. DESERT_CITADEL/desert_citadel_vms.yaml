virtual_machines:

  # ---------------------------------------------------------------------------
  # VM 1: SDP-MDP-1 - Service Delivery Point Router
  # ---------------------------------------------------------------------------
  - vmid: 5100
    name: "SDP-MDP-1"
    role: "Service Delivery Point"
    site: "Singapore"
    organization: "Madripoor"
    
    template: "vyos"  # Resolved from templates.yaml
    
    clone:
      type: "linked"
      start_after_clone: true
    
    resources:
      memory_mb: 2048
      cores: 1
      sockets: 1
    
    network:
      preserve_net0: true
      additional_nics:
        - nic_id: 1
          model: "virtio"
          bridge: "mdp_sng_in"
          firewall: true
        - nic_id: 2
          model: "virtio"
          bridge: "SOC"
          firewall: true
        - nic_id: 3
          model: "virtio"
          bridge: "mdp_sng_ex"
          firewall: true
    
    proxmox:
      node: "cdx-pve-03"
      pool: "EX_DESERT_CITADEL"
      tags:
        - "mpnet"

