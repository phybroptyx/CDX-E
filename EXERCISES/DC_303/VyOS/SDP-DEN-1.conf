configure

########################################
# System Identity / Base Services
########################################

set system host-name 'SDP-DEN-1'
set system domain-name 'dc303.denhac.org'
set system time-zone 'America/Denver'

set service ntp server '46.244.164.88'
set service ssh port '22'

########################################
# Interfaces
# eth0: Internal LAN — net0 starts on Layer0 (DHCP bootstrap), configure_networking
#       applies this config via SSH then migrates net0 to ex_dc303_in. The commit
#       reconfigures eth0 to the static exercise IP (breaking the SSH session, which
#       is expected). After the NIC migration the relay reaches VyOS at 68.27.129.1.
########################################
delete interfaces ethernet eth0 address
set interfaces ethernet eth0 description 'to Internal LAN'
set interfaces ethernet eth0 address '68.27.129.1/24'

# eth1: External / Upstream toward Tier-1 (EQIX-4)
set interfaces ethernet eth1 description 'to ISP'
set interfaces ethernet eth1 address '68.27.5.249/16'

# eth2: SOC Connection
set interfaces ethernet eth2 description 'to SOC'
set interfaces ethernet eth2 address '10.30.3.1/24'

########################################
# Static Routing
########################################

# Default route to the upstream Tier-1 router (EQIX-4 T1 Gateway)
set protocols static route 0.0.0.0/0 next-hop '68.27.0.112'

########################################
# OSPF – CDX-I Route Advertisement
# - Area 4 covers the 68.27.0.0/16 range, enabling peering with EQIX-4 T1
#   on eth1 AND advertising the 68.27.129.0/24 connected route intra-area.
# - The route-map/prefix-list guard additionally filters static redistribution
#   to prevent leaking RFC1918 (10.30.3.0/24) or the default route into OSPF.
# - Primary advertisement path: connected route on eth0 via intra-area OSPF.
# - Redistribute static: belt-and-suspenders for any future static summaries.
########################################

# Use CDX-I uplink IP as OSPF router-id for clarity
set protocols ospf parameters router-id '68.27.5.249'

# Enable OSPF on 68.27.0.0/16 — covers both:
#   eth0 (68.27.129.1/24) — internal LAN (advertises 68.27.129.0/24 intra-area)
#   eth1 (68.27.5.249/16) — CDX-I uplink (forms adjacency with EQIX-4 T1)
# Tier-1 EQIX-4 has "area 4 network 68.27.0.0/16" — adjacency forms on eth1.
# CDX-I learns the return path to DC303 VMs via this intra-area advertisement.
set protocols ospf area 4 network '68.27.0.0/16'

# Prefix-list: permit only the DC303 internal /24; deny all else (including
# the default route and SOC RFC1918 space) from static redistribution.
set policy prefix-list DEN-INTERNAL rule 10 action 'permit'
set policy prefix-list DEN-INTERNAL rule 10 prefix '68.27.129.0/24'
set policy prefix-list DEN-INTERNAL rule 100 action 'deny'
set policy prefix-list DEN-INTERNAL rule 100 prefix '0.0.0.0/0'

# Route-map applies the prefix-list filter to static redistribution
set policy route-map OSPF-REDIST-STATIC-DEN rule 10 action 'permit'
set policy route-map OSPF-REDIST-STATIC-DEN rule 10 match ip address prefix-list 'DEN-INTERNAL'
set policy route-map OSPF-REDIST-STATIC-DEN rule 100 action 'deny'

# Redistribute static routes into OSPF (filtered by route-map above)
set protocols ospf redistribute static route-map 'OSPF-REDIST-STATIC-DEN'

########################################
# NAT
# (None – this SDP is purely routed, no translation)
########################################
# (Intentionally no "set nat ..." statements)

########################################
# Commit & Save
########################################

commit
save
exit
