---
# =============================================================================
# Role: read_apt_config — Default Variables
# =============================================================================

# Base path for APT library directories
# playbook_dir resolves to playbooks/, so ../APTs reaches project root.
apts_base_dir: "{{ playbook_dir }}/../APTs"

# Default APT to load if neither 'apt' variable nor scenario.red_team.apt is set
default_apt: "GENERIC_RED"
