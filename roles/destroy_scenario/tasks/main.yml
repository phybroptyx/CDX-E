---
# =============================================================================
# Role: destroy_scenario
# =============================================================================
# Destroys scenario VMs via Terraform and removes the exercise resource pool.
#
# Expects facts set by read_exercise_config:
#   scenario     — parsed scenario.yml
#   exercise_dir — path to EXERCISES/<name>/
# =============================================================================

# ----------------------------------------------------------------------------
# Preflight
# ----------------------------------------------------------------------------
- name: Assert required facts are present
  ansible.builtin.assert:
    that:
      - scenario is defined
      - exercise_dir is defined
    fail_msg: "Required facts not found. Ensure exercise_initiation.yml runs first."

- name: Check Terraform is available
  ansible.builtin.command:
    cmd: "{{ terraform_binary }} version"
  register: _tf_version
  failed_when: _tf_version.rc != 0
  changed_when: false

- name: Check Terraform state exists
  ansible.builtin.stat:
    path: "{{ exercise_dir }}/terraform/terraform.tfstate"
  register: _tf_state_stat

- name: Report — no Terraform state (skipping destroy)
  ansible.builtin.debug:
    msg: >-
      No Terraform state found at {{ exercise_dir }}/terraform/terraform.tfstate.
      Skipping terraform destroy — VMs may need manual removal.
  when: not _tf_state_stat.stat.exists

# Parse state to check whether any resources actually exist.
# Terraform state may exist but contain zero resources (e.g. after a previous
# destroy that removed all resources but left the state file in place).
- name: Read Terraform state content
  ansible.builtin.slurp:
    src: "{{ exercise_dir }}/terraform/terraform.tfstate"
  register: _tf_state_raw
  when: _tf_state_stat.stat.exists

- name: Check Terraform state has resources
  ansible.builtin.set_fact:
    _tf_has_resources: >-
      {{ ((_tf_state_raw.content | b64decode | from_json).resources | default([])) | length > 0 }}
  when: _tf_state_stat.stat.exists

- name: Report — state empty (skipping destroy)
  ansible.builtin.debug:
    msg: >-
      Terraform state exists but contains no resources — all VMs already removed.
      Skipping terraform destroy.
  when: _tf_state_stat.stat.exists and not (_tf_has_resources | default(false) | bool)

# ----------------------------------------------------------------------------
# Power off VMs — Proxmox requires VMs to be stopped before deletion
# ----------------------------------------------------------------------------
- name: Power off VMs before destroy
  ansible.builtin.uri:
    url: >-
      {{ proxmox_api_url }}/nodes/{{ (item.proxmox | default({})).node
         | default(scenario.proxmox.node) }}/qemu/{{ item.vmid }}/status/stop
    method: POST
    headers:
      Authorization: >-
        PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}
    validate_certs: "{{ proxmox_validate_certs }}"
    status_code: [200, 500]   # 500 = already stopped — idempotent
  loop: "{{ virtual_machines }}"
  loop_control:
    label: "{{ item.name }} (vmid={{ item.vmid }})"
  ignore_errors: true   # VM may not exist or already be stopped
  when:
    - _tf_state_stat.stat.exists
    - _tf_has_resources | default(false) | bool

- name: Wait for VMs to reach stopped state
  ansible.builtin.uri:
    url: >-
      {{ proxmox_api_url }}/nodes/{{ (item.proxmox | default({})).node
         | default(scenario.proxmox.node) }}/qemu/{{ item.vmid }}/status/current
    method: GET
    headers:
      Authorization: >-
        PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}
    validate_certs: "{{ proxmox_validate_certs }}"
    status_code: [200, 500]   # 500 = VM doesn't exist yet (already destroyed)
  loop: "{{ virtual_machines }}"
  loop_control:
    label: "{{ item.name }} (vmid={{ item.vmid }})"
  register: _vm_status
  retries: 12
  delay: 5
  until: >-
    _vm_status.status == 500 or
    _vm_status.json.data.status | default('stopped') == 'stopped'
  ignore_errors: true
  when:
    - _tf_state_stat.stat.exists
    - _tf_has_resources | default(false) | bool

# ----------------------------------------------------------------------------
# Terraform destroy
# ----------------------------------------------------------------------------
- name: Terraform destroy
  ansible.builtin.command:
    cmd: "{{ terraform_binary }} destroy -auto-approve -input=false"
    chdir: "{{ exercise_dir }}/terraform"
  register: _tf_destroy
  changed_when: >-
    'Destroy complete!' in _tf_destroy.stdout and
    '0 destroyed' not in _tf_destroy.stdout
  when:
    - _tf_state_stat.stat.exists
    - _tf_has_resources | default(false) | bool

- name: Show Terraform destroy output
  ansible.builtin.debug:
    msg: "{{ _tf_destroy.stdout_lines }}"
  when:
    - _tf_state_stat.stat.exists
    - _tf_has_resources | default(false) | bool

# ----------------------------------------------------------------------------
# Resource pool cleanup — after VMs are gone
# ----------------------------------------------------------------------------
- name: Delete exercise resource pool
  ansible.builtin.uri:
    url: "{{ proxmox_api_url }}/pools/EX_{{ scenario.exercise.name }}"
    method: DELETE
    headers:
      Authorization: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"
    validate_certs: "{{ proxmox_validate_certs }}"
    status_code: [200, 400, 404, 500]   # 400/404/500 = already gone, continue
  when: _tf_state_stat.stat.exists

# ----------------------------------------------------------------------------
# Clean up dynamic inventory file so downstream plays have no stale hosts
# ----------------------------------------------------------------------------
- name: Remove exercise_hosts.yml inventory file
  ansible.builtin.file:
    path: "{{ playbook_dir }}/../inventory/exercise_hosts.yml"
    state: absent

# ----------------------------------------------------------------------------
# Summary
# ----------------------------------------------------------------------------
- name: Scenario VM teardown summary
  ansible.builtin.debug:
    msg: |
      Scenario VM teardown complete.
      Exercise: {{ scenario.exercise.name }}
      State   : {{ exercise_dir }}/terraform/
