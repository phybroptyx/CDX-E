---
# =============================================================================
# CDX-E Role Defaults
# =============================================================================

# Proxmox API connection
# Reads from secrets/credentials.yml (nested proxmox.*) with flat-var fallbacks
proxmox_api_host: "{{ proxmox.api_host | default('cdx-pve-01') }}"
proxmox_api_port: 8006
proxmox_api_user: "{{ proxmox.api_user | default('ansible@pam') }}"
proxmox_api_token_id: "{{ proxmox.api_token_id | default('ansible') }}"
proxmox_api_token_secret: "{{ proxmox.api_token_secret | default('2167c3f5-5a36-4bb4-b1a5-cb6da0426be1') }}"
proxmox_validate_certs: false

# Template source node (where all VM templates reside)
template_node: "cdx-pve-01"

# Proxmox cluster hosts
proxmox_hosts:
  - "cdx-pve-01"
  - "cdx-pve-02"
  - "cdx-pve-03"

# Timing
clone_timeout: 300
post_clone_delay: 8
post_stop_delay: 3

# Configure phase timing
guest_agent_initial_delay: 30
guest_agent_poll_interval: 10
guest_agent_poll_retries: 30
bootstrap_ssh_timeout: 15
configure_ssh_timeout: 30
