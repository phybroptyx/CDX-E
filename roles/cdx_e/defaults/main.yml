---
# =============================================================================
# CDX-E Role Defaults
# =============================================================================

# Proxmox API connection
proxmox_api_host: "cdx-pve-01"
proxmox_api_port: 8006
proxmox_api_user: "root@pam"
proxmox_api_token_id: "ansible"
proxmox_api_token_secret: ""  # Set via ansible-vault or --extra-vars
proxmox_validate_certs: false

# Template source node (where all VM templates reside)
template_node: "cdx-pve-01"

# Proxmox cluster hosts
proxmox_hosts:
  - "cdx-pve-01"
  - "cdx-pve-02"
  - "cdx-pve-03"

# Timing
clone_timeout: 300
post_clone_delay: 8
post_stop_delay: 3

# Configure phase timing
guest_agent_initial_delay: 30
guest_agent_poll_interval: 10
guest_agent_poll_retries: 30
bootstrap_ssh_timeout: 15
configure_ssh_timeout: 30
