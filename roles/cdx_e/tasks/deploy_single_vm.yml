---
# =============================================================================
# Deploy a single VM (included per-VM from deploy.yml loop)
# Variable 'vm' is passed from the parent loop
# =============================================================================

- name: "Resolve template for {{ vm.name }}"
  set_fact:
    _template: "{{ template_registry[vm.template] }}"

# ---- Idempotency Check ----

- name: "Check if VM {{ vm.vmid }} already exists"
  set_fact:
    _vm_exists: "{{ (vm.vmid | int) in existing_vmids }}"

- name: "Check VM name match for {{ vm.vmid }}"
  set_fact:
    _vm_name_matches: "{{ existing_vm_names[vm.vmid | string] | default(existing_vm_names[vm.vmid | int] | default('')) == vm.name }}"
  when: _vm_exists | bool

- name: "Skip {{ vm.name }} - already exists"
  debug:
    msg: "VM {{ vm.vmid }} ({{ vm.name }}) already exists - skipping"
  when: _vm_exists | bool and (_vm_name_matches | default(false)) | bool

- name: "Fail {{ vm.name }} - VMID conflict"
  fail:
    msg: >-
      VM ID {{ vm.vmid }} exists with name '{{ existing_vm_names[vm.vmid | string] | default(existing_vm_names[vm.vmid | int] | default('UNKNOWN')) }}'
      but expected '{{ vm.name }}'. Resolve ID conflict manually.
  when: _vm_exists | bool and not (_vm_name_matches | default(false)) | bool

# ---- Step 1: Clone Template ----

- name: "Clone template {{ _template.id }} -> {{ vm.name }} ({{ vm.vmid }})"
  community.general.proxmox_kvm:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_token_id: "{{ proxmox_api_token_id }}"
    api_token_secret: "{{ proxmox_api_token_secret }}"
    validate_certs: "{{ proxmox_validate_certs }}"
    node: "{{ template_node }}"
    clone: "{{ _template.id }}"
    newid: "{{ vm.vmid }}"
    name: "{{ vm.name }}"
    target: "{{ vm.proxmox.node }}"
    pool: "{{ vm.proxmox.pool }}"
    full: "{{ 'true' if (vm.clone.type | default('linked')) == 'full' else 'false' }}"
    timeout: "{{ clone_timeout }}"
  when:
    - not (_vm_exists | bool)
    - not cdx_dry_run | bool
  register: _clone_result

- name: "Wait for clone to settle"
  pause:
    seconds: "{{ post_clone_delay }}"
  when:
    - _clone_result is defined
    - _clone_result is changed

# ---- Step 2: Configure Resources ----

- name: "Build VM description for {{ vm.name }}"
  set_fact:
    _vm_description: |-
      # {{ vm.name }}
      ## {{ _template.os }}
      ## {{ vm.role | default('Unknown Role') }}
      ## {{ vm.organization | default('Unknown') }}, {{ vm.site | default('Unknown') }}
      ### {{ (vm.cloud_init.ip ~ '/' ~ (vm.cloud_init.cidr | default(24))) if (vm.cloud_init is defined and vm.cloud_init.ip is defined) else 'DHCP' }}

- name: "Configure resources for {{ vm.name }}"
  community.general.proxmox_kvm:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_token_id: "{{ proxmox_api_token_id }}"
    api_token_secret: "{{ proxmox_api_token_secret }}"
    validate_certs: "{{ proxmox_validate_certs }}"
    node: "{{ vm.proxmox.node }}"
    vmid: "{{ vm.vmid }}"
    memory: "{{ vm.resources.memory_mb }}"
    cores: "{{ vm.resources.cores }}"
    sockets: "{{ vm.resources.sockets }}"
    description: "{{ _vm_description }}"
    tags: "{{ vm.proxmox.tags | join(';') }}"
    update: true
    update_unsafe: true
  when:
    - not (_vm_exists | bool)
    - not cdx_dry_run | bool

# ---- Step 3: Add NICs ----

- name: "Add NIC net{{ nic.nic_id }} to {{ vm.name }}"
  community.general.proxmox_kvm:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_token_id: "{{ proxmox_api_token_id }}"
    api_token_secret: "{{ proxmox_api_token_secret }}"
    validate_certs: "{{ proxmox_validate_certs }}"
    node: "{{ vm.proxmox.node }}"
    vmid: "{{ vm.vmid }}"
    net:
      "net{{ nic.nic_id }}": "{{ _nic_str }}"
    update: true
    update_unsafe: true
  vars:
    _mac_part: "{{ (nic.model ~ '=' ~ nic.mac) if nic.mac is defined else nic.model }}"
    _fw_part: "firewall={{ '1' if nic.firewall | default(false) else '0' }}"
    _tag_part: "{{ ',tag=' ~ nic.tag if nic.tag is defined else '' }}"
    _nic_str: "{{ _mac_part }},bridge={{ nic.bridge }},{{ _fw_part }}{{ _tag_part }}"
  loop: "{{ vm.network.additional_nics | default([]) }}"
  loop_control:
    loop_var: nic
    label: "{{ vm.name }} net{{ nic.nic_id }}"
  when:
    - not (_vm_exists | bool)
    - not cdx_dry_run | bool

# ---- Step 4: Cloud-Init ----

- name: "Configure cloud-init for {{ vm.name }}"
  community.general.proxmox_kvm:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_token_id: "{{ proxmox_api_token_id }}"
    api_token_secret: "{{ proxmox_api_token_secret }}"
    validate_certs: "{{ proxmox_validate_certs }}"
    node: "{{ vm.proxmox.node }}"
    vmid: "{{ vm.vmid }}"
    ipconfig:
      ipconfig1: "ip={{ vm.cloud_init.ip }}/{{ vm.cloud_init.cidr | default(24) }},gw={{ vm.cloud_init.gateway }}"
    nameservers:
      - "{{ vm.cloud_init.nameserver }}"
    update: true
    update_unsafe: true
  when:
    - not (_vm_exists | bool)
    - not cdx_dry_run | bool
    - vm.cloud_init is defined
    - vm.cloud_init.ip is defined

- name: "Regenerate cloud-init image for {{ vm.name }}"
  uri:
    url: "https://{{ proxmox_api_host }}:{{ proxmox_api_port }}/api2/json/nodes/{{ vm.proxmox.node }}/qemu/{{ vm.vmid }}/cloudinit"
    method: PUT
    headers:
      Authorization: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"
    validate_certs: "{{ proxmox_validate_certs }}"
  when:
    - not (_vm_exists | bool)
    - not cdx_dry_run | bool
    - vm.cloud_init is defined
    - vm.cloud_init.ip is defined
  ignore_errors: true

# ---- Step 5: Start VM ----

- name: "Start {{ vm.name }}"
  community.general.proxmox_kvm:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_token_id: "{{ proxmox_api_token_id }}"
    api_token_secret: "{{ proxmox_api_token_secret }}"
    validate_certs: "{{ proxmox_validate_certs }}"
    node: "{{ vm.proxmox.node }}"
    vmid: "{{ vm.vmid }}"
    state: started
  when:
    - not (_vm_exists | bool)
    - not cdx_dry_run | bool
    - vm.clone.start_after_clone | default(false) | bool
    - not cdx_no_start | bool

- name: "{{ vm.name }} left stopped (no_start={{ cdx_no_start }})"
  debug:
    msg: "VM {{ vm.vmid }} created but not started"
  when:
    - not (_vm_exists | bool)
    - cdx_no_start | bool or not (vm.clone.start_after_clone | default(false) | bool)
