# Base path for SOC layout library directories
# playbook_dir resolves to playbooks/, so ../SOC_LAYOUTS reaches project root.
soc_layouts_base_dir: "{{ playbook_dir }}/../SOC_LAYOUTS"

# Default SOC layout if neither 'layout' variable nor scenario.blue_team.layout is set
default_soc_layout: "malcolm_basic"
