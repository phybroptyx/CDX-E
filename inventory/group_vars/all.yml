---
# =============================================================================
# CDX-E - Global Defaults
# =============================================================================
# Single source of truth for shared configuration.
#
# Override precedence (lowest → highest):
#   this file → playbook vars_files → host_vars → -e extra vars
#
# Sensitive values (proxmox_api_token_secret, domain.*, vm_credentials.*)
# MUST come from secrets/credentials.yml loaded via vars_files. There are
# intentionally no fallback defaults for credentials here.
# =============================================================================

# =============================================================================
# Proxmox API
# =============================================================================

# Proxmox bridge used for management (Layer0). VMs clone with net0 here for
# DHCP bootstrap; Ansible migrates the NIC to the exercise bridge post-config.
proxmox_layer0_bridge: "Layer0"

proxmox_api_host: "{{ proxmox.api_host | default('cdx-pve-01') }}"
proxmox_api_port: 8006
proxmox_api_url: "https://{{ proxmox_api_host }}:{{ proxmox_api_port }}/api2/json"
proxmox_api_user: "{{ proxmox.api_user | default('ansible@pam') }}"
proxmox_api_token_id: "{{ proxmox.api_token_id | default('ansible') }}"
proxmox_api_token_secret: "{{ proxmox.api_token_secret }}"   # required — load from secrets/credentials.yml
proxmox_validate_certs: false

# CDX-RELAY: persistent Debian 12 VM that provides exercise connectivity.
# SSH ProxyJump (Linux/VyOS) and SOCKS5 proxy port 1080 (Windows WinRM).
# Must be running before any exercise deployment playbook executes.
proxmox_relay_vmid: 102
proxmox_relay_node: "cdx-pve-01"

# Node where VM templates reside (source for all clones)
template_node: "cdx-pve-01"

# All cluster nodes (used for pool and network operations)
proxmox_hosts:
  - "cdx-pve-01"
  - "cdx-pve-02"
  - "cdx-pve-03"

# =============================================================================
# Timing
# =============================================================================

# VM clone and configuration phase
clone_timeout: 300
post_clone_delay: 8
post_stop_delay: 3
guest_agent_initial_delay: 75
guest_agent_poll_interval: 10
guest_agent_poll_retries: 30
bootstrap_ssh_timeout: 15
configure_ssh_timeout: 30

# VM power-on: seconds to wait for SSH port (Linux/VyOS) after boot.
# Windows WinRM wait now uses the HTTP 401 poll below instead of wait_for.
vm_power_wait_timeout: 300
vm_power_wait_sleep: 10

# WinRM HTTP 401 readiness poll — vm_power_management (post-NIC-migration) and
# configure_vm (role entry). Polls http://<ip>:5985/wsman until HTTP 401 is
# returned, confirming the WinRM HTTP listener is fully initialized.
# HTTP 401 is a stronger gate than TCP port open — it eliminates the HTTP 400
# transient window that caused intermittent WinRM failures on workstations.
#   winrm_http_ready_retries × winrm_http_ready_delay = 60 × 10s = 10 min max
winrm_http_ready_retries: 60
winrm_http_ready_delay:   10

# DHCP bootstrap timing (Layer0 NIC — Windows VMs before NIC migration)
# network-get-interfaces is polled until a non-loopback, non-APIPA IPv4 appears.
dhcp_discovery_retries: 20   # Max poll attempts (20 × 15 s = 5 minutes max)
dhcp_discovery_delay:   15   # Seconds between poll attempts

# Sysprep completion polling — vm_power_management queries the Windows registry
# key HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\OOBE\IsSetupComplete via
# QEMU guest-exec (virtio-serial, no WinRM) and retries until the value equals 1.
# IsSetupComplete=1 means Windows has finished the OOBE/Sysprep final pass and is
# ready for DHCP polling and guest-exec static IP configuration.
#   sysprep_poll_retries × sysprep_poll_delay = 60 × 15 s = 15 minutes max.
sysprep_poll_retries: 60   # Max poll attempts before failing
sysprep_poll_delay:   15   # Seconds between poll attempts
windows_sysprep_settle_delay: 30  # RETIRED — replaced by DHCP poll gate + WinRM HTTP 401 poll


# =============================================================================
# Packer
# =============================================================================

packer_binary: "/usr/local/bin/packer"
packer_dir: "{{ playbook_dir }}/../INFRASTRUCTURE/packer"
packer_plugin_path: "/opt/packer/plugins"
packer_disk_type: "qcow2"           # Disk format for all Packer template builds
packer_disk_cache_mode: "writeback" # Disk cache mode for Packer template builds
packer_template_storage: "QNAP"     # Proxmox storage pool where Packer registers built templates

# =============================================================================
# Terraform
# =============================================================================

terraform_binary: "terraform"
terraform_proxmox_provider_version: "~> 0.68"
terraform_plugin_dir: "/opt/terraform/plugins"  # Pre-staged provider dir (empty string = online download)
vm_clone_type: "linked"             # All exercise VMs are linked clones from RAID-staged template copies
vm_clone_storage: "raid"            # Destination storage for Terraform VM clones (per-node ~6TB RAID array)

# Per-node VMID offset for RAID-staged template copies.
# staged_vmid = template_registry[key].id + proxmox_node_template_offset[target_node]
# VMID namespace: 2000-2099 QNAP masters | 2100-2199 pve-01 | 2200-2299 pve-02 | 2300-2399 pve-03
proxmox_node_template_offset:
  cdx-pve-01: 100
  cdx-pve-02: 200
  cdx-pve-03: 300

# Ansible group names treated as team infrastructure (excluded from scenario VMs)
team_groups:      ['red_team', 'apt', 'blue_team', 'soc']
red_team_groups:  ['red_team', 'apt']
blue_team_groups: ['blue_team', 'soc']

# Groups that auto-start at Terraform clone time (started=true in main.tf).
# All other scenario VMs clone powered off and are brought up by
# vm_power_management at the appropriate pipeline phase:
#   Phase 2b  : routers + domain_controllers (this list)
#   Phase 4b  : member servers (after AD domain is built)
#   Phase 6a  : workstations  (after domain DHCP scope is active)
terraform_autostart_groups: ['routers', 'domain_controllers']

# =============================================================================
# VM Configuration
# =============================================================================

vm_timezone: "UTC"

# Windows Server feature sets — keyed by ansible_group.
# install_windowsfeature installs the list for the current host's group.
# Override per-host by setting windows_features: [...] in the host's vars,
# or extend a group's set with windows_features_extra: [...].
windows_feature_sets:

  domain_controllers:
    # Core AD role + DNS (required for DC promotion by configure_active_directory)
    - AD-Domain-Services
    - DNS
    # Management tooling
    - GPMC
    - RSAT-AD-Tools
    - RSAT-AD-PowerShell
    - RSAT-DNS-Server
    # Runtime prerequisites
    - Net-Framework-45-Features

  servers:
    # Domain management tools (useful on all member servers in a training range)
    - RSAT-AD-Tools
    - RSAT-AD-PowerShell
    # Runtime
    - Net-Framework-45-Features
    # Network troubleshooting
    - Telnet-Client

  workstations: []   # Workstations: no server features by default

  soc:
    # SOC workstations benefit from AD management tools
    - RSAT-AD-Tools
    - RSAT-AD-PowerShell
    - Net-Framework-45-Features

  sql_servers:
    # SQL Server prerequisites (engine manages its own .NET/VC++ installs)
    - RSAT-AD-Tools
    - RSAT-AD-PowerShell
    - Net-Framework-45-Features
    # Useful for troubleshooting SQL connectivity
    - Telnet-Client

  exchange_servers:
    # Base management tools only (matches sql_servers pattern).
    # When scenario.phases.services.exchange is false, this server is a placeholder
    # — no Exchange-specific features are installed here. IIS/WAS prerequisites
    # and all other Exchange requirements are handled by deploy_microsoft_exchange
    # (Phase 6), which only runs when exchange: true.
    - RSAT-AD-Tools
    - RSAT-AD-PowerShell
    - Net-Framework-45-Features
    - Telnet-Client

  sccm_servers:
    # SCCM / Configuration Manager prerequisites
    - RSAT-AD-Tools
    - RSAT-AD-PowerShell
    # .NET 4.5 (required) + .NET 3.5 (required for some SCCM components)
    - Net-Framework-45-Features
    - NET-Framework-Features
    # BITS — Background Intelligent Transfer Service (used by SCCM clients)
    - BITS
    # IIS — required for Management Point and Distribution Point roles
    - Web-Server
    - Web-Mgmt-Console
    - Web-Asp-Net45
    - Web-Windows-Auth
    # Remote Differential Compression — required by SCCM
    - RDC
    # WDS is required for OS Deployment boot images (optional for basic SCCM)
    # - WDS
    - Telnet-Client

  dhcp_servers:
    # DHCP Server role + management tools
    - DHCP
    - RSAT-DHCP
    # AD tools (needed to authorize DHCP in AD)
    - RSAT-AD-Tools
    - RSAT-AD-PowerShell
    - Net-Framework-45-Features

  # Red/Blue team and routing VMs are configured by their own roles
  red_team:  []
  apt:       []
  blue_team: []
  routers:   []

# =============================================================================
# Template Registry
# =============================================================================
# Single source of truth for every supported OS template.
#
# Fields:
#   id             — Proxmox VMID of the built template (null = not yet assigned)
#   status         — build state: built | in-progress | planned
#   os             — Human-readable OS name (used in descriptions / debug output)
#   os_type        — OS category: windows | linux | vyos | opnsense
#   packer_template — Packer .pkr.hcl filename (planned filenames kept for all entries)
#   packer_vars    — Packer .pkrvars.hcl filename
#   proxmox_name   — Proxmox template name Packer registers after a successful build
#
# Status values:
#   built       — template exists in Proxmox and is ready for cloning
#   in-progress — being built manually; Packer build design is planned
#   planned     — VMID reserved; Packer build not yet started
#
# Usage examples:
#   template_registry[vm.template].id             → Proxmox source VMID for cloning
#   template_registry[item].packer_template       → .pkr.hcl file to build
#   template_registry[item].os_type               → windows / linux / vyos / opnsense
# =============================================================================

template_registry:

  # ── Network ──────────────────────────────────────────────────────────────
