---
all:
  hosts:
    localhost:
      ansible_connection: local
  children:
    proxmox_cluster:
      hosts:
        cdx-pve-01:
        cdx-pve-02:
        cdx-pve-03:
      vars:
        ansible_user: root
        ansible_connection: ssh
        ansible_ssh_private_key_file: ~/.ssh/id_ed25519

    # CDX-RELAY — persistent management relay VM (VMID 102)
    # Single Debian 13 host providing SSH ProxyJump + SOCKS5 for all exercises.
    # Provisioned once by playbooks/provision_relay.yml.
    relay:
      hosts:
        cdx-relay:
          ansible_host: 10.0.0.10
          ansible_user: cdxadmin
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519
