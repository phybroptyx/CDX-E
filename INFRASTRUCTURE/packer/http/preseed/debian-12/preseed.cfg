# =============================================================================
# Debian 12 (Bookworm) — Preseed Configuration (Packer Build)
# =============================================================================
# Unattended Debian installer preseed for CDX infrastructure base template.
# Produces a minimal image with no GUI; customization happens post-clone.
#
# Use cases:
#   - CDX-RELAY VM (VMID 102) — SSH router + SOCKS5 proxy
#   - Any future Debian-based CDX infrastructure nodes
# =============================================================================

# Locale and keyboard
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us
d-i keyboard-configuration/layoutcode string us

# Network — DHCP on first interface during install (Layer0)
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string debian-template
d-i netcfg/get_domain string cdx.lab
d-i netcfg/get_nameservers string
d-i netcfg/confirm_static boolean true
d-i netcfg/wireless_wep string

# Mirror — use DVD packages only (no network mirror; Layer0 has no internet)
d-i apt-setup/use_mirror boolean false

# Clock
d-i clock-setup/utc boolean true
d-i time/zone string UTC
d-i clock-setup/ntp boolean true

# Partitioning — entire disk, single root partition (no LVM overhead for base)
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# User accounts — root disabled, cdxadmin with sudo
d-i passwd/root-login boolean false
d-i passwd/user-fullname string CDX Admin
d-i passwd/username string cdxadmin
d-i passwd/user-password password IyTt+,uDhtR@.303
d-i passwd/user-password-again password IyTt+,uDhtR@.303

# Package selection — relay-optimised minimal set
# python3:        Ansible managed node requirement
# qemu-guest-agent: Proxmox integration (IP discovery, graceful shutdown)
# openssh-server: Ansible + management connectivity
# nftables:       Firewall (inter-segment isolation rules applied by configure_relay)
# iproute2:       ip route / ip addr commands for dynamic NIC and route management
# curl, wget:     General utility for post-clone provisioning
tasksel tasksel/first multiselect
d-i pkgsel/include string \
  openssh-server \
  qemu-guest-agent \
  python3 \
  python3-apt \
  sudo \
  nftables \
  iproute2 \
  curl \
  wget \
  ca-certificates \
  gnupg \
  lsb-release
d-i pkgsel/upgrade select full-upgrade
d-i pkgsel/update-policy select none

# GRUB — install to MBR of first disk
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default

# Post-install commands
# - cdxadmin gets passwordless sudo (Ansible requirement)
# - SSH enabled at boot
# - QEMU Guest Agent enabled at boot
# - SSH password auth left ON for Packer communicator; Ansible hardens post-clone
d-i preseed/late_command string \
  echo 'cdxadmin ALL=(ALL) NOPASSWD:ALL' > /target/etc/sudoers.d/cdxadmin ; \
  chmod 440 /target/etc/sudoers.d/cdxadmin ; \
  in-target systemctl enable ssh ; \
  in-target systemctl enable qemu-guest-agent ; \
  in-target systemctl enable nftables

# Finish — eject and reboot
d-i cdrom-detect/eject boolean true
d-i finish-install/reboot_in_progress note
