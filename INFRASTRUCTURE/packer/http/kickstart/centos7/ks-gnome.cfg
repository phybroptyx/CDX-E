# =============================================================================
# CentOS 7 GNOME Desktop - Kickstart Configuration (Packer Build)
# =============================================================================
# GNOME Desktop install with QEMU Guest Agent and SPICE agent.
# =============================================================================

# Install from CDROM
install
cdrom

# System language and keyboard
lang en_US.UTF-8
keyboard us

# Network
network --bootproto=dhcp --device=eth0 --onboot=on
network --hostname=centos7-gnome-template

# Root and user accounts
rootpw --plaintext IyTt+,uDhtR@.303
user --name=cdxadmin --password=IyTt+,uDhtR@.303 --plaintext --groups=wheel

# Firewall and SELinux
firewall --enabled --ssh
selinux --enforcing

# Timezone
timezone UTC --isUtc --ntpservers=pool.ntp.org

# Bootloader
bootloader --location=mbr --boot-drive=sda

# Partitioning
zerombr
clearpart --all --initlabel
autopart --type=lvm

# X Window System
xconfig --startxonboot

# Package selection - GNOME Desktop
%packages
@^gnome-desktop-environment
@core
@gnome-desktop
@x11
openssh-server
openssh-clients
sudo
curl
wget
qemu-guest-agent
spice-vdagent
%end

# Post-install
%post --log=/root/ks-post.log
# Enable services
systemctl enable sshd
systemctl enable qemu-guest-agent
systemctl set-default graphical.target

# Configure sudoers for cdxadmin
echo 'cdxadmin ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/cdxadmin
chmod 440 /etc/sudoers.d/cdxadmin
%end

# Reboot after install
reboot
