# =============================================================================
# Offline Staging Manifest
# =============================================================================
# Lists all external dependencies that must be staged on the ACN and/or
# Proxmox cluster BEFORE air-gapped deployment. Use this manifest to verify
# readiness before disconnecting from the Internet.
#
# Workflow:
#   1. On an Internet-connected system, download all listed items
#   2. Transfer to the ACN / Proxmox storage
#   3. Verify checksums
#   4. Disconnect from Internet and proceed with deployment
# =============================================================================

binaries:
  terraform:
    version: "1.14.5"
    platform: "linux_amd64"
    url: "https://releases.hashicorp.com/terraform/1.14.5/terraform_1.14.5_linux_amd64.zip"
    install_path: "/usr/local/bin/terraform"

  packer:
    version: "1.15.0"
    platform: "linux_amd64"
    url: "https://releases.hashicorp.com/packer/1.15.0/packer_1.15.0_linux_amd64.zip"
    install_path: "/usr/local/bin/packer"

system_packages:
  xorriso:
    description: "ISO creation tool required by Packer cd_files"
    install:
      debian: "apt install -y xorriso"
      rhel: "yum install -y xorriso"
    notes: "Packer uses xorriso/mkisofs to assemble autounattend and preseed files into a temporary ISO"

terraform_providers:
  bpg_proxmox:
    source: "bpg/proxmox"
    version: "0.95.0"
    mirror_command: >
      terraform providers mirror
      -platform=linux_amd64
      /opt/terraform/providers
    acn_path: "/opt/terraform/providers"
    terraformrc: |
      provider_installation {
        filesystem_mirror {
          path = "/opt/terraform/providers"
        }
        direct {
          exclude = ["*/*/*"]
        }
      }

packer_plugins:
  proxmox:
    source: "github.com/hashicorp/proxmox"
    version: ">= 1.2.3"
    init_command: >
      PACKER_PLUGIN_PATH=/opt/packer/plugins
      packer init templates/
    acn_path: "/opt/packer/plugins"

